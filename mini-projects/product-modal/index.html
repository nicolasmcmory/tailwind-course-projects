<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../../static/css/tailwind.output.css" />
  <title>Product Modal</title>
</head>

<!-- Background and main positioning -->

<body class="flex justify-center items-center min-h-screen bg-slate-100">

  <!-- Modal -->
  <div
    class="flex flex-col justify-center items-center p-4 gap-4 shadow-2xl bg-white rounded-xl md:flex-row md:items-start md:p-16">

    <!-- Image block -->
    <img src="images/headphone.png" alt="" class="mt-2 mx-auto w-60 duration-200 hover:scale-105" />

    <!-- Info block -->
    <div class="flex flex-col justify-center items-center p-4 gap-2 min-w-44 text-black text-center md:items-start ">

      <!-- Free tag -->
      <h3 class="bg-black rounded-full py-1 px-3 text-white text-sm">Free shipping</h3>

      <!-- Free product description -->
      <h2 class="text-xl mt-4">Headset</h2>

      <!-- Price block -->
      <p class="text-xs line-through">$799</p>
      <p class="text-4xl">$599</p>
      <p class="text-xs text-gray-600">This offer is valid until the end of the year !</p>

      <!-- Action btn 1 -->
      <button class="bg-blue-400 hover:bg-blue-600 rounded-xl text-white text-sm w-full px-2 py-3">Add to cart</button>

      <!-- Stock line -->
      <div class="flex items-center gap-1">
        <div class="w-3 h-3 bg-green-500 rounded-full hover:animate-ping"></div>
        <p class="text-xs text-gray-600">Only 5 items left in stock!</p>
      </div>

      <!-- Action btn 2-3 -->
      <div class="flex flex-col justify-center items-center gap-2 w-full md:flex-row">
        <button
          class="border-2 border-gray-500 rounded-lg text-sm w-1/2 px-2 py-3 transition-all duration-400 hover:-translate-y-0.5 hover:shadow-lg hover:border-gray-900">Action
          1</button>
        <button
          class="border-2 border-gray-500 rounded-lg text-sm w-1/2 px-2 py-3 transition-all duration-400 hover:-translate-y-0.5 hover:shadow-lg hover:border-gray-900">Action
          2</button>
      </div>
    </div>

</body>

</html>
