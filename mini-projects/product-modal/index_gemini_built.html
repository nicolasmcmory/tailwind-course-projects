<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <title>Product Modal</title>
</head>

<!-- Background and main positioning -->
<body class="bg-slate-100 flex items-center justify-center min-h-screen">

  <!-- Card Container -->
  <div class="bg-white p-6 m-3 space-y-10 rounded-2xl shadow-2xl md:flex md:flex-row md:space-y-0 md:space-x-10 md:m-0 md:p-16">

    <!-- Image -->
    <div>
      <img src="images/headphone.png" alt="Razer Kraken Kitty" class="duration-200 w-60 hover:scale-105" />
    </div>

    <!-- Content -->
    <div class="flex flex-col space-y-6">
      <!-- Label -->
      <div class="flex flex-col mb-4 space-y-3 text-left">
        <div>
          <div class="inline-block px-3 py-1 text-sm text-white bg-black rounded-full">
            Free Shipping
          </div>
        </div>
        <!-- Title -->
        <div class="max-w-sm text-2xl font-semibold">
          Razer Kraken Kitty Edt Gaming Headset Quartz
        </div>
        <!-- Price Container -->
        <div class="flex flex-col mb-4 space-y-1 text-left">
          <p class="line-through text-sm text-gray-500">$799</p>
          <p class="text-5xl font-bold">$599</p>
          <p class="text-sm font-light text-gray-400">
            This offer is valid until April 3rd or as long as stock lasts!
          </p>
        </div>
        <!-- Button Group -->
        <div>
          <button
            class="w-full bg-blue-600 text-white rounded-lg px-8 py-4 shadow-md hover:bg-blue-700 transition duration-150 active:scale-[0.98]">
            Add to cart
          </button>
        </div>

        <!-- Stock -->
        <div class="flex items-center space-x-3">
          <div class="w-3 h-3 bg-green-500 rounded-full"></div>
          <div class="text-sm">50+ pcs. in stock</div>
        </div>

        <!-- Bottom Buttons -->
        <div class="flex flex-col space-y-4 md:flex-row md:space-y-0 md:space-x-4">
          <button
            class="flex items-center justify-center py-3 px-5 space-x-3 border-2 border-gray-200 rounded-lg shadow-sm hover:bg-gray-50 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-150">
            <img src="images/weight.png" alt="weight" class="w-6" />
            <span class="text-sm">Add to cart</span>
          </button>

          <button
            class="flex items-center justify-center py-3 px-5 space-x-3 border-2 border-gray-200 rounded-lg shadow-sm hover:bg-gray-50 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-150">
            <img src="images/heart.png" alt="heart" class="w-6" />
            <span class="text-sm">Add to wishlist</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
