<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../../static/css/tailwind.output.css" />
  <title>Document</title>
</head>

<body>
  <!-- Background -->
  <div class="flex-base-h h-screen bg-slate-800 text-white">
    <!-- Container -->
    <div class="bg-zinc-500 p-3 mx-6 rounded-xl">
      <!-- Card -->
      <div class="flex-base-v md:flex-base-h rounded-l-2xl">
        <img src="./images/image.jpg" alt=""
          class="object-contain rounded-xl h-64 md:h-52 md:rounded-l-xl md:rounded-r-none transform hover:scale-105 hover:rounded-xl duration-200" />

        <div class="p-6 md:p-12">
          <h2 class="font-serif text-xl font-medium text-center md:text-left">Subscribe to newsletter</h2>

          <p class="max-x-s my-4 text-xs leading-5 tracking-wide text-center md:text-left">Text goes here</p>

          <div class="flex-base-v mt-5 space-y-4 md:flex-base-h md:space-x-3 md:space-y-0">
            <input type="text" placeholder="Name goes here"
              class="p-2 px-4 border border-zinc-600 placeholder:text-xs placeholder:text-white placeholder:text-center md:text-left placeholder:md:text-left focus:outline-none" />
            <button
              class="p-2 text-slate-800 bg-zinc-400 hover:bg-zinc-700 transition-all duration-200 rounded-md text-xs font-medium text-center">Subscribe</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
