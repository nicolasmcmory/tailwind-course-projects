<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../../static/css/tailwind.output.css" />
  <title>Image Gallery</title>
</head>

<body>
  <!-- Background -->
  <div class="bg-cyan-50 min-h-screen flex items-center justify-center text-dark">

    <!-- Card -->
    <section
      class="bg-white rounded-lg flex flex-col justify-center items-center mx-6 p-4 capitalize text-center md:p-40">

      <!-- nav section -->
      <section class="flex flex-col justify-center items-center gap-1 md:flex-row md:self-end">
        <div class="p-2 border-b-3 border-transparent hover:border-dark transition-all duration-200"><a
            href="#top">Vector</a>
        </div>
        <div class="p-2 border-b-3 border-transparent hover:border-dark transition-all duration-200"><a
            href="#top">Illustrations</a>
        </div>
        <div class="p-2 border-b-3 border-transparent hover:border-dark transition-all duration-200"><a
            href="#top">Images</a>
        </div>
        <div class="p-2 border-b-3 border-transparent hover:border-dark transition-all duration-200"><a
            href="#top">Icons</a>
        </div>
      </section>

      <!-- Search & submit section -->
      <section class="flex flex-col justify-center items-center gap-1 md:flex-row md:justify-between">

        <!-- Search -->
        <div class="flex justify-center border-b border-medium-dark ">
          <input type="search" placeholder="Find" class="placeholder:text-medium-dark font-light" />
          <button><svg xmlns="http://www.w3.org/2000/svg" class="w-8 text-gray-300 duration-200 hover:scale-110"
              viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" fill="none" stroke-linecap="round"
              stroke-linejoin="round">
              <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
              <circle cx="10" cy="10" r="7"></circle>
              <line x1="21" y1="21" x2="15" y2="15"></line>
            </svg></button>
        </div>

        <button class="btn">Submit images</button>
      </section>

      <!-- Image tile section -->
  </div>
  </div>
</body>

</html>
