<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../../static/css/tailwind.output.css" />
  <title>Image Gallery</title>
</head>

<body>
  <!-- Background -->
  <div class="bg-cyan-50 min-h-screen flex-r text-dark">

    <!-- Card -->
    <div class="bg-white rounded-lg flex-c gap-6 m-4 py-6 px-8 shadow-lg capitalize text-center md:p-40">

      <!-- nav section -->
      <section class="flex flex-col justify-center items-center gap-1 md:flex-row md:self-end">
        <div class="p-2 border-b-3 border-transparent hover:border-dark transition-all duration-200"><a
            href="#top">Vector</a>
        </div>
        <div class="p-2 border-b-3 border-transparent hover:border-dark transition-all duration-200"><a
            href="#top">Illustrations</a>
        </div>
        <div class="p-2 border-b-3 border-transparent hover:border-dark transition-all duration-200"><a
            href="#top">Images</a>
        </div>
        <div class="p-2 border-b-3 border-transparent hover:border-dark transition-all duration-200"><a
            href="#top">Icons</a>
        </div>
      </section>

      <!-- Search & submit section -->
      <section class="w-full pt-20 flex flex-col justify-between items-center gap-4 md:flex-row">

        <!-- Search -->
        <div class="flex justify-center border-b border-medium-dark ">
          <input type="search" placeholder="Find"
            class="outline-none border-none focus:outline-none placeholder:text-medium-dark font-light" />
          <button><svg xmlns="http://www.w3.org/2000/svg" class="w-8 text-gray-300 duration-200 hover:scale-110"
              viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" fill="none" stroke-linecap="round"
              stroke-linejoin="round">
              <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
              <circle cx="10" cy="10" r="7"></circle>
              <line x1="21" y1="21" x2="15" y2="15"></line>
            </svg></button>
        </div>

        <!-- Upload button -->
        <button class="btn min-w-52 max-w-72">Upload</button>
      </section>

      <!-- Image tile section -->
      <section class="flex justify-center items-center gap-4 flex-wrap">

        <!-- Tile -->
        <div class="relative group min-w-52 max-w-fit w-1/3">
          <img src="./images/image1.jpg" alt="Image 1" class="w-72" />

          <!-- Tile description overlay -->
          <div
            class="absolute bottom-0 left-0 right-0 min-h-fit h-1/3 max-w-full flex justify-between gap-3 p-2 bg-dark opacity-0 text-light group-hover:opacity-70 transition-opacity duration-200 ">
            <div class="min-h-fit flex flex-col items-start gap-1 p-2">
              <p class="text-sm text-left font-medium">Abstract Painting</p>
              <p class="text-xs text-left">245 likes - 35 shares</p>
            </div>
            <img src="./images/bookmark.svg" alt="Bookmark" class="w-6" />
          </div>
        </div>

        <!-- Tile -->
        <div class="relative group min-w-52 max-w-fit w-1/3">
          <img src="./images/image2.jpg" alt="Image 2" class="w-72" />

          <!-- Tile description overlay -->
          <div
            class="absolute bottom-0 left-0 right-0 min-h-fit h-1/3 max-w-full flex justify-between gap-3 p-2 bg-dark opacity-0 text-light group-hover:opacity-70 transition-opacity duration-200 ">
            <div class="min-h-fit flex flex-col items-start gap-1 p-2">
              <p class="text-sm text-left font-medium">Color Study</p>
              <p class="text-xs text-left">189 likes - 22 shares</p>
            </div>
            <img src="./images/bookmark.svg" alt="Bookmark" class="w-6" />
          </div>
        </div>

        <!-- Tile -->
        <div class="relative group min-w-52 max-w-fit w-1/3">
          <img src="./images/image3.jpg" alt="Image 3" class="w-72" />

          <!-- Tile description overlay -->
          <div
            class="absolute bottom-0 left-0 right-0 min-h-fit h-1/3 max-w-full flex justify-between gap-3 p-2 bg-dark opacity-0 text-light group-hover:opacity-70 transition-opacity duration-200 ">
            <div class="min-h-fit flex flex-col items-start gap-1 p-2">
              <p class="text-sm text-left font-medium">Portrait Mood</p>
              <p class="text-xs text-left">312 likes - 41 shares</p>
            </div>
            <img src="./images/bookmark.svg" alt="Bookmark" class="w-6" />
          </div>
        </div>

        <!-- Tile -->
        <div class="relative group min-w-52 max-w-fit w-1/3">
          <img src="./images/image4.jpg" alt="Image 4" class="w-72" />

          <!-- Tile description overlay -->
          <div
            class="absolute bottom-0 left-0 right-0 min-h-fit h-1/3 max-w-full flex justify-between gap-3 p-2 bg-dark opacity-0 text-light group-hover:opacity-70 transition-opacity duration-200 ">
            <div class="min-h-fit flex flex-col items-start gap-1 p-2">
              <p class="text-sm text-left font-medium">Modern Design</p>
              <p class="text-xs text-left">276 likes - 30 shares</p>
            </div>
            <img src="./images/bookmark.svg" alt="Bookmark" class="w-6" />
          </div>
        </div>

        <!-- Tile -->
        <div class="relative group min-w-52 max-w-fit w-1/3">
          <img src="./images/image5.jpg" alt="Image 5" class="w-72" />

          <!-- Tile description overlay -->
          <div
            class="absolute bottom-0 left-0 right-0 min-h-fit h-1/3 max-w-full flex justify-between gap-3 p-2 bg-dark opacity-0 text-light group-hover:opacity-70 transition-opacity duration-200 ">
            <div class="min-h-fit flex flex-col items-start gap-1 p-2">
              <p class="text-sm text-left font-medium">Creative Concept</p>
              <p class="text-xs text-left">401 likes - 58 shares</p>
            </div>
            <img src="./images/bookmark.svg" alt="Bookmark" class="w-6" />
          </div>
        </div>

        <!-- Tile -->
        <div class="relative group min-w-52 max-w-fit w-1/3">
          <img src="./images/image6.jpg" alt="Image 6" class="w-72" />

          <!-- Tile description overlay -->
          <div
            class="absolute bottom-0 left-0 right-0 min-h-fit h-1/3 max-w-full flex justify-between gap-3 p-2 bg-dark opacity-0 text-light group-hover:opacity-70 transition-opacity duration-200 ">
            <div class="min-h-fit flex flex-col items-start gap-1 p-2">
              <p class="text-sm text-left font-medium">Visual Story</p>
              <p class="text-xs text-left">154 likes - 19 shares</p>
            </div>
            <img src="./images/bookmark.svg" alt="Bookmark" class="w-6" />
          </div>
        </div>
      </section>
    </div>
  </div>
</body>

</html>
