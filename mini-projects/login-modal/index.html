<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../../static/css/tailwind.out.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;500;600;700&family=Rokkitt:wght@600;700&display=swap"
    />
    <title>Login Modal</title>
  </head>

  <body>
    <!-- Background -->
    <div class="flex justify-center items-center bg-rose-50 min-h-screen">
      <!-- Modal -->
      <div
        class="flex flex-col items-center gap-4 bg-white shadow-lg p-4 rounded-lg min-w-52 max-w-108 text-center"
      >
        <!-- Group: Login/close modal -->
        <div class="flex justify-between items-center gap-4 p-2 w-full">
          <h1 class="font-mono font-bold text-4xl">Log In</h1>
          <div
            class="group bg-gray-300 hover:bg-gray-600 mb-3 p-2 rounded-full transition hover:-translate-y-1 duration-150"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-6 h-6 text-black group-hover:text-gray-100"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              fill="none"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </div>
        </div>

        <!-- Description block -->
        <p class="mb-6 font-light text-gray-500 text-sm text-left">
          Log in to your account to upload or download pictures, videos or music.
        </p>

        <!-- Email field -->
        <input
          type="email"
          placeholder="Enter your email"
          class="p-4 border border-gray-500 rounded-sm focus:outline-rose-200 w-full h-16"
        />

        <!-- Forgot password -->
        <h2 class="font-thin text-cyan-600">Forgot password</h2>

        <!-- Submit login button -->
        <button
          class="bg-cyan-600 hover:bg-cyan-700 mb-6 rounded-sm w-full h-16 font-semibold text-white transition hover:-translate-y-1 duration-150"
        >
          Log In
        </button>

        <!-- Divider -->
        <div class="border-gray-400 border-t w-3/4 h-2"></div>

        <!-- ALt log message -->
        <h3 class="mb-6 text-gray-400 text-sm">or login with</h3>

        <!-- Alt log buttons -->
        <button
          class="flex justify-center items-center gap-2 hover:shadow-lg p-2 border border-gray-400 rounded-sm w-full h-16 transition hover:-translate-y-1 duration-150"
        >
          <img src="./images/facebook.png" alt="Facebook" class="h-10" /><span
            class="text-gray-800 text-thin"
            >Facebook</span
          >
        </button>
        <button
          class="flex justify-center items-center gap-2 hover:shadow-lg p-2 border border-gray-400 rounded-sm w-full h-16 transition hover:-translate-y-1 duration-150"
        >
          <img src="./images/google.png" alt="Facebook" class="h-10" /><span
            class="text-gray-800 text-thin"
            >Google</span
          >
        </button>
      </div>
    </div>
  </body>
</html>
